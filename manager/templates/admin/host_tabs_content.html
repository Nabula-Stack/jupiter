                                if (resp.status === 'success') { alert('Unmounted successfully.'); fetchStorage(h); }
                                else alert('Unmount failed: ' + (resp.message || 'Unknown error'));
                            })
                            .catch(function(err) { alert('Error: ' + err.message); });
                    } else if (action === 'delete') {
                        if (!confirm('WARNING: Delete datastore "' + ds + '" from ' + hostName + '?\n\nThis will unmount the datastore. Data on the underlying disk is NOT erased, but the VMFS volume will be inaccessible.')) return;
                        fetch('/api/v1/storage/' + encodeURIComponent(hostName) + '/datastores/' + encodeURIComponent(ds) + '/unmount', {method: 'POST'})
                            .then(function(r) { return r.json(); })
                            .then(function(resp) {
                                if (resp.status === 'success') { alert('Datastore removed from ' + hostName + '.'); fetchStorage(h); }
                                else alert('Failed: ' + (resp.message || 'Unknown error'));
                            })
                            .catch(function(err) { alert('Error: ' + err.message); });
                    }
                });
            });
        }

        function renderStorage(d) {
            var html = '<div class="tab-section-title">Datastores</div>';
            if (d.datastores && d.datastores.length) {
                html += '<table class="tab-panel-table"><thead><tr><th>Datastore</th><th>Type</th><th>Capacity</th><th>Used</th><th>Free</th><th style="width:120px">Usage</th><th>Actions</th></tr></thead><tbody>';
                d.datastores.forEach(function(ds) {
                    var actMenu = 'ds-menu-' + (d._host || '') + '-' + esc(ds.name).replace(/[^a-zA-Z0-9]/g, '_');
                    html += '<tr><td class="tab-name-col">' + esc(ds.name) + '</td>' +
                        '<td><span class="tab-badge tab-badge-type">' + esc(ds.type || 'VMFS') + '</span></td>' +
                        '<td>' + esc(fmtBytes(ds.capacity)) + '</td>' +
                        '<td>' + esc(fmtBytes(ds.used)) + '</td>' +
                        '<td>' + esc(fmtBytes(ds.free)) + '</td>' +
                        '<td>' + usageBar(ds.used, ds.capacity) + '</td>' +
                        '<td>' +
                            '<div class="neb-ds-actions-wrap">' +
                                '<button type="button" class="neb-ds-actions-btn" data-menu="' + actMenu + '">' +
                                    'Actions <span class="material-symbols-outlined" style="font-size:14px">expand_more</span>' +
                                '</button>' +
                                '<div class="neb-ds-actions-menu" id="' + actMenu + '">' +
                                    '<div class="neb-ds-actions-item" data-stor-action="browse" data-host="' + esc(d._host || '') + '" data-ds="' + esc(ds.name) + '"><span class="material-symbols-outlined">folder_open</span>Browse</div>' +
                                    '<div class="neb-ds-actions-item" data-stor-action="refresh" data-host="' + esc(d._host || '') + '" data-ds="' + esc(ds.name) + '"><span class="material-symbols-outlined">refresh</span>Refresh</div>' +
                                    '<div class="neb-ds-actions-item" data-stor-action="register" data-host="' + esc(d._host || '') + '" data-ds="' + esc(ds.name) + '"><span class="material-symbols-outlined">app_registration</span>Register a VM</div>' +
                                    '<div class="neb-ds-actions-item" data-stor-action="rename" data-host="' + esc(d._host || '') + '" data-ds="' + esc(ds.name) + '"><span class="material-symbols-outlined">edit</span>Rename</div>' +
                                    '<div class="neb-ds-actions-item" data-stor-action="increase" data-host="' + esc(d._host || '') + '" data-ds="' + esc(ds.name) + '"><span class="material-symbols-outlined">expand</span>Increase Capacity</div>' +
                                    '<div class="neb-ds-actions-item" data-stor-action="permissions" data-host="' + esc(d._host || '') + '" data-ds="' + esc(ds.name) + '"><span class="material-symbols-outlined">lock</span>Permissions</div>' +
                                    '<div class="neb-ds-actions-item danger" data-stor-action="unmount" data-host="' + esc(d._host || '') + '" data-ds="' + esc(ds.name) + '"><span class="material-symbols-outlined">eject</span>Unmount</div>' +
                                    '<div class="neb-ds-actions-item danger" data-stor-action="delete" data-host="' + esc(d._host || '') + '" data-ds="' + esc(ds.name) + '"><span class="material-symbols-outlined">delete_forever</span>Delete</div>' +
                                '</div>' +
                            '</div>' +
                        '</td></tr>';
                });
                html += '</tbody></table>';
            } else { html += '<div class="tab-empty">No Datastores found</div>'; }
            return html;
        }

        var initialTab = urlParams.get('tab');
        var initialHost = parseInt(urlParams.get('host') || '', 10);
        if (!Number.isNaN(initialHost)) {
            pendingFocus = initialHost;
        }
        if (initialTab === 'virtual-machines' || initialTab === 'network' || initialTab === 'storage' || initialTab === 'services') {
            switchTab(initialTab);
        } else {
            switchTab('hosts');
        }
    });
})();
</script>
