{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}
    {{ block.super }}
    <style>
        :root {
            --nebula-primary: #c46f4f;
            --nebula-secondary: #8a4a35;
            --nebula-accent: #e19a7f;
            --nebula-light: #f8f1ec;
            --nebula-border: #e8d3c6;
            --nebula-page-bg: linear-gradient(135deg, #f8f1ec 0%, #efdfd4 100%);
            --nebula-surface: #ffffff;
            --nebula-text: #2f271d;
            --nebula-muted: #6d6252;
            --nebula-sidebar-width: clamp(220px, 18vw, 280px);
            --nebula-ui-scale: 0.9;
        }

        .dark {
            --nebula-page-bg: linear-gradient(135deg, #161317 0%, #1f1a1f 45%, #282127 100%);
            --nebula-light: #1e1a1f;
            --nebula-border: #3a333d;
            --nebula-surface: #241f26;
            --nebula-text: #eee7db;
            --nebula-muted: #b9ae9a;
        }

        html {
            /* Fluid root sizing keeps layout proportional across window sizes */
            font-size: clamp(13px, 0.3vw + 12px, 16px);
        }
        
        body {
            background: var(--nebula-page-bg);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--nebula-text);
        }

        body.nebula-admin {
            zoom: var(--nebula-ui-scale);
        }

        @supports not (zoom: 1) {
            body.nebula-admin {
                transform: scale(var(--nebula-ui-scale));
                transform-origin: top left;
                width: calc(100% / var(--nebula-ui-scale));
            }
        }
        
        #container {
            display: flex;
            gap: 0;
            max-width: 100%;
        }
        
        #sidebar {
            width: var(--nebula-sidebar-width);
            background: linear-gradient(180deg, var(--nebula-primary) 0%, var(--nebula-secondary) 100%);
            color: white;
            padding: 20px 0;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }

        .dark #sidebar {
            background: linear-gradient(180deg, #5f5648 0%, #463f35 100%);
        }
        
        #main {
            margin-left: var(--nebula-sidebar-width);
            flex: 1;
            background: var(--nebula-light);
            min-width: 0;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            margin-bottom: 20px;
        }
        
        .sidebar-header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .nebula-branding {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: inherit;
            text-decoration: none;
            font-weight: 700;
        }

        .nebula-branding img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }
        
        .sidebar-header .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
        }
        
        .sidebar-panel {
            margin: 0 10px 15px 10px;
        }
        
        .panel-title {
            font-size: 12px;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-title i {
            font-size: 14px;
        }
        
        .panel-items {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .panel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
            color: white;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        
        .panel-item:hover {
            background: rgba(255,255,255,0.15);
            padding-left: 18px;
        }
        
        .panel-item i {
            min-width: 16px;
            text-align: center;
        }
        
        .panel-item.active {
            background: rgba(0,0,0,0.2);
            font-weight: bold;
            border-left: 3px solid white;
            padding-left: 12px;
        }
        
        #content {
            padding: clamp(12px, 2vw, 30px);
        }
        
        .content-header {
            background: var(--nebula-surface);
            border: 1px solid var(--nebula-border);
            padding: clamp(16px, 2vw, 30px);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .content-header h1 {
            margin: 0 0 10px 0;
            color: var(--nebula-primary);
            font-size: 32px;
        }
        
        .content-header p {
            margin: 0;
            color: var(--nebula-muted);
        }
        
        @media (max-width: 768px) {
            #sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            
            #main {
                margin-left: 0;
            }
        }
    </style>
{% endblock %}

{% block bodyclass %}{{ block.super }} nebula-admin{% endblock %}

{% block branding %}
    <a href="/admin/" class="nebula-branding">
        <img src="{% static 'manager/img/jupiter-logo.svg' %}" alt="Jupiter" />
        <span>Jupiter Admin</span>
    </a>
{% endblock %}

{% block extrahead %}
    {{ block.super }}
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
        // Global fetch patch: attach CSRF + same-origin credentials for mutating requests.
        (function () {
            if (window.__nebulaFetchCsrfPatched) return;
            window.__nebulaFetchCsrfPatched = true;

            function getCookie(name) {
                var value = '; ' + document.cookie;
                var parts = value.split('; ' + name + '=');
                if (parts.length === 2) return parts.pop().split(';').shift();
                return '';
            }

            function isSafeMethod(method) {
                var m = String(method || 'GET').toUpperCase();
                return m === 'GET' || m === 'HEAD' || m === 'OPTIONS' || m === 'TRACE';
            }

            var originalFetch = window.fetch.bind(window);
            window.fetch = function (input, init) {
                var requestInit = init ? Object.assign({}, init) : {};
                var method = (requestInit.method || (input && input.method) || 'GET').toUpperCase();
                var rawUrl = typeof input === 'string' ? input : ((input && input.url) || '');
                var sameOrigin = true;

                if (rawUrl) {
                    try {
                        var target = new URL(rawUrl, window.location.origin);
                        sameOrigin = target.origin === window.location.origin;
                    } catch (e) {
                        sameOrigin = true;
                    }
                }

                if (sameOrigin) {
                    if (!requestInit.credentials) {
                        requestInit.credentials = 'same-origin';
                    }

                    if (!isSafeMethod(method)) {
                        var token = getCookie('csrftoken');
                        if (token) {
                            var headers = new Headers(requestInit.headers || (input && input.headers) || undefined);
                            if (!headers.has('X-CSRFToken')) {
                                headers.set('X-CSRFToken', token);
                            }
                            if (!headers.has('X-Requested-With')) {
                                headers.set('X-Requested-With', 'XMLHttpRequest');
                            }
                            requestInit.headers = headers;
                        }
                    }
                }

                return originalFetch(input, requestInit);
            };
        })();

        // Smart table-only refresh (not full page reload)
        // Only refresh on list pages, not on add/delete pages
        if (!window.location.pathname.includes('/add/') && 
            !window.location.pathname.includes('/delete/') &&
            !document.querySelector('input[name="_saveasnew"]')) {
            
            setInterval(function() {
                // Fetch current page HTML
                fetch(window.location.href, {
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                .then(response => response.text())
                .then(html => {
                    // Parse the response HTML
                    const parser = new DOMParser();
                    const newDoc = parser.parseFromString(html, 'text/html');
                    
                    // Find the table in current page and new response
                    const currentTable = document.querySelector('#result_list');
                    const newTable = newDoc.querySelector('#result_list');
                    
                    // Replace only the table if it exists
                    if (currentTable && newTable) {
                        currentTable.innerHTML = newTable.innerHTML;
                    }
                })
                .catch(error => console.log('Table refresh error:', error));
            }, 5000); // Every 5 seconds
        }
    </script>
{% endblock %}
