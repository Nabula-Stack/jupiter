{% extends "admin/base.html" %}

{% block content %}
<div style="max-width:980px;margin:24px auto;padding:0 16px;">
    <div style="background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;box-shadow:0 6px 18px rgba(15,23,42,0.06);margin-bottom:18px;">
        <h1 style="margin:0 0 8px 0;font-size:28px;color:#0f172a;">Admin Page</h1>
        <p style="margin:0;color:#475569;font-size:14px;">This page is dedicated to managing users and hosts.</p>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;">
        <div style="background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
            <div style="padding:14px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-weight:700;color:#0f172a;">User Management</div>
            <div style="padding:10px;display:flex;flex-direction:column;gap:8px;">
                <a href="/admin/auth/user/" style="text-decoration:none;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;color:#0f172a;background:#fff;">Manage Users</a>
                <a href="/admin/auth/user/add/" style="text-decoration:none;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;color:#0f172a;background:#fff;">Add User</a>
                <a href="/admin/auth/group/" style="text-decoration:none;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;color:#0f172a;background:#fff;">Manage Groups</a>
            </div>
        </div>

        <div style="background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
            <div style="padding:14px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-weight:700;color:#0f172a;">Host Management</div>
            <div style="padding:10px;display:flex;flex-direction:column;gap:8px;">
                <a href="/admin/manager/host/" style="text-decoration:none;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;color:#0f172a;background:#fff;">All Hosts</a>
                <a href="/admin/manager/host/add/" style="text-decoration:none;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;color:#0f172a;background:#fff;">Add Host</a>
                <a href="/admin/manager/host/?is_active__exact=1" style="text-decoration:none;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;color:#0f172a;background:#fff;">Active Hosts</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
