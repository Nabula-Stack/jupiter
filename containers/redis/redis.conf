port 6379
tcp-keepalive 60

# Cache-first profile for Nebula UI/channels responsiveness.
# Persistence is disabled to avoid fork overhead during heavy activity.
save ""
appendonly no

databases 2

# Keep Redis inside container memory limits and evict least recently used keys.
maxmemory 192mb
maxmemory-policy allkeys-lru

lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

timeout 0
loglevel notice