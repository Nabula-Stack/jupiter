services:
  # --- PostgreSQL ---
  db:
    build:
      context: .
      dockerfile: containers/db/Dockerfile
    image: nebula-db:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis (channels + cache) ---
  redis:
    build:
      context: .
      dockerfile: containers/redis/Dockerfile
    image: nebula-redis:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Django / Daphne (ASGI) ---
  web:
    build:
      context: .
      dockerfile: containers/web/Dockerfile
    image: nebula-web:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:${WEB_INTERNAL_PORT:-8000}"
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      SSH_KEY_PATH: ${SSH_KEY_PATH}
      ESXI_SSH_KEY_PATH: ${ESXI_SSH_KEY_PATH}
      KVM_SSH_KEY_PATH: ${KVM_SSH_KEY_PATH}
      WEB_INTERNAL_PORT: ${WEB_INTERNAL_PORT:-8000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - ./ssh_keys/rsa:/app/ssh_keys/rsa:ro
      - ./ssh_keys/nebula_rsa:/app/ssh_keys/nebula_rsa:ro

  # --- Background sync worker (updates DB snapshots continuously) ---
  sync-worker:
    build:
      context: .
      dockerfile: containers/sync-worker/Dockerfile
    image: nebula-sync-worker:latest
    restart: unless-stopped
    profiles:
      - always-sync
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      SSH_KEY_PATH: ${SSH_KEY_PATH}
      ESXI_SSH_KEY_PATH: ${ESXI_SSH_KEY_PATH}
      KVM_SSH_KEY_PATH: ${KVM_SSH_KEY_PATH}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ssh_keys/rsa:/app/ssh_keys/rsa:ro
      - ./ssh_keys/nebula_rsa:/app/ssh_keys/nebula_rsa:ro
volumes:
  pgdata:
  static_files:
